{% extends 'base.html' %}

{% block title %}Детали сообщения{% endblock %}

{% block content %}
<h2>Детали сообщения</h2>
<p><a href="{% url 'recipients:message_update' message.id %}">Редактировать</a></p>
<p><a href="{% url 'recipients:message_delete' message.id %}">Удалить</a></p>
<ul>
    <li>ID: {{ message.id }}</li>
    <li>Название: {{ message.topic }}</li>
    <li>Основной текст: {{ message.body }}</li>
</ul>
<a href="{% url 'recipients:message_list' %}">Назад к списку</a>
{% endblock %}
